<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Orach</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a25;--surface:#1e1e2e;--surface2:#252538;
  --border:#2a2a40;--border2:#353550;--accent:#e8c96d;--accent2:#c9a94a;
  --text:#f0f0f5;--text2:#9090a8;--text3:#5a5a72;
  --red:#e05555;--green:#55c088;--blue:#5588e0;
  --radius:10px;--radius-lg:16px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
h1,h2,h3{font-family:'Bebas Neue',sans-serif;letter-spacing:0.04em;line-height:1.1}
button{cursor:pointer;font-family:'DM Sans',sans-serif;border:none;outline:none}
input,textarea,select{font-family:'DM Sans',sans-serif;outline:none}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:56px}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.1em;color:var(--accent);cursor:pointer}
.nav-links{display:flex;gap:8px;align-items:center}
.nav-btn{background:none;color:var(--text2);padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;transition:all .2s;border:none}
.nav-btn:hover,.nav-btn.active{background:var(--surface2);color:var(--text)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;color:#000;flex-shrink:0}
.nav-username{font-size:13px;font-weight:500;color:var(--text2)}
.nav-user{display:flex;align-items:center;gap:10px}

/* PAGES */
.page{display:none;min-height:calc(100vh - 56px);padding:2rem}
.page.active{display:block}

/* AUTH */
.auth-wrap{min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem;width:380px;max-width:100%}
.auth-title{font-size:32px;color:var(--accent);margin-bottom:0.25rem}
.auth-sub{color:var(--text2);font-size:13px;margin-bottom:2rem}
.form-label{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-size:14px;margin-bottom:1rem;transition:border .2s}
.form-input:focus{border-color:var(--accent)}
.btn-primary{width:100%;background:var(--accent);color:#000;font-weight:600;font-size:14px;padding:11px;border-radius:var(--radius);transition:all .2s;border:none}
.btn-primary:hover{background:var(--accent2)}
.auth-toggle{text-align:center;margin-top:1.25rem;font-size:13px;color:var(--text2)}
.auth-toggle span{color:var(--accent);cursor:pointer;font-weight:500}
.form-error{background:rgba(224,85,85,0.12);border:1px solid rgba(224,85,85,0.3);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:1rem}

/* HOME */
.home-hero{text-align:center;padding:3rem 0 2.5rem}
.home-hero h1{font-size:clamp(48px,8vw,88px);color:var(--accent);margin-bottom:0.5rem}
.home-hero p{color:var(--text2);font-size:15px;max-width:480px;margin:0 auto}
.section-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.25rem}
.section-title{font-size:28px;color:var(--text)}
.section-sub{font-size:13px;color:var(--text3)}
.grid-4{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:1rem}

/* CARDS */
.series-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:all .2s;display:flex;flex-direction:column}
.series-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.card-poster{height:220px;display:flex;align-items:center;justify-content:center;font-size:52px;flex-shrink:0;position:relative;overflow:hidden}
.card-poster img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.card-poster .poster-emoji{position:relative;z-index:1}
.card-body{padding:0.75rem 0.9rem 0.9rem;flex:1;display:flex;flex-direction:column}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:0.05em;line-height:1.2;margin-bottom:4px}
.card-meta{font-size:11px;color:var(--text3);margin-bottom:8px}
.card-scores{display:flex;gap:6px;margin-top:auto;flex-wrap:wrap}
.score-pill{display:flex;align-items:center;gap:4px;padding:3px 7px;border-radius:20px;font-size:11px;font-weight:600;font-family:'DM Mono',monospace}
.score-imdb{background:rgba(232,201,109,0.12);color:var(--accent)}
.score-site{background:rgba(85,192,136,0.12);color:var(--green)}
.score-site-none{background:rgba(90,90,114,0.12);color:var(--text3)}

/* SEARCH & FILTER */
.search-bar{position:relative;margin-bottom:1rem}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 16px 11px 44px;color:var(--text);font-size:14px;transition:border .2s}
.search-input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:18px;pointer-events:none}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
.filter-btn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;background:var(--surface);border:1px solid var(--border);color:var(--text2);transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#000}

/* RANKINGS */
.rankings-wrap{max-width:900px;margin:0 auto}
.rankings-tabs{display:flex;gap:4px;margin-bottom:2rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;width:fit-content}
.tab-btn{padding:8px 20px;border-radius:7px;font-size:13px;font-weight:500;background:none;color:var(--text2);transition:all .2s;border:none}
.tab-btn.active{background:var(--accent);color:#000}
.rank-row{display:flex;align-items:center;gap:1rem;padding:0.9rem 1.1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:all .2s}
.rank-row:hover{border-color:var(--border2);background:var(--surface2)}
.rank-num{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text3);min-width:32px;text-align:center}
.rank-num.top3{color:var(--accent)}
.rank-emoji{font-size:26px;width:36px;text-align:center;flex-shrink:0}
.rank-info{flex:1;min-width:0}
.rank-title{font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-meta{font-size:13px;color:var(--text3);margin-top:3px}
.type-badge{display:inline-block;margin-left:8px;font-size:10px;font-weight:700;letter-spacing:0.5px;color:var(--blue);background:rgba(24,95,165,0.18);border-radius:4px;padding:2px 6px;vertical-align:middle}
.rank-score{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;flex-shrink:0}

/* DETAIL */
.detail-wrap{max-width:800px;margin:0 auto}
.detail-back{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:13px;cursor:pointer;margin-bottom:1.5rem;background:none;border:none;font-family:'DM Sans',sans-serif;transition:color .2s}
.detail-back:hover{color:var(--text)}
.detail-header{display:flex;gap:2rem;margin-bottom:2rem;align-items:flex-start}
.detail-poster{font-size:72px;width:130px;height:190px;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;position:relative}
.detail-poster img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;border-radius:var(--radius-lg)}
.detail-poster .poster-emoji{position:relative;z-index:1}
.detail-title{font-size:48px;color:var(--accent);margin-bottom:0.25rem}
.detail-tagline{color:var(--text2);font-size:13px;margin-bottom:1rem}
.detail-desc{font-size:14px;line-height:1.7;color:var(--text2);margin-bottom:1.25rem}
.detail-meta-row{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1.25rem}
.detail-tag{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--text2)}
.scores-row{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:2rem}
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;text-align:center;flex:1;min-width:100px}
.score-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.score-val{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1}
.score-val.imdb{color:var(--accent)}
.score-val.friends{color:var(--green)}
.score-val.none{color:var(--text3);font-size:24px}
.score-count{font-size:11px;color:var(--text3);margin-top:4px}

/* RATING */
.rate-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:2rem}
.rate-section h3{font-size:20px;margin-bottom:1rem}
.score-input{width:80px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-size:20px;font-weight:600;font-family:'DM Mono',monospace;text-align:center;transition:border .2s}
.score-input:focus{border-color:var(--accent)}
.score-input.invalid{border-color:var(--red)}
.score-input::-webkit-outer-spin-button,.score-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.score-input[type=number]{-moz-appearance:textfield}
.rate-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-size:14px;resize:vertical;min-height:80px;margin-bottom:1rem;transition:border .2s}
.rate-textarea:focus{border-color:var(--accent)}
.btn-submit{background:var(--accent);color:#000;font-weight:600;font-size:13px;padding:9px 20px;border-radius:var(--radius);transition:all .2s;border:none}
.btn-submit:hover{background:var(--accent2)}
.btn-edit{background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:12px;padding:5px 12px;border-radius:6px;transition:all .2s}
.btn-edit:hover{border-color:var(--border2);color:var(--text)}
.btn-danger{background:rgba(224,85,85,0.1);border:1px solid rgba(224,85,85,0.3);color:var(--red);font-size:12px;padding:5px 12px;border-radius:6px;transition:all .2s}
.btn-danger:hover{background:rgba(224,85,85,0.2)}

/* COMMENTS */
.comment-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:10px}
.comment-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.comment-body{font-size:14px;color:var(--text2);line-height:1.6}
.comment-score{font-family:'DM Mono',monospace;background:rgba(232,201,109,0.12);color:var(--accent);padding:2px 8px;border-radius:20px;font-size:12px;font-weight:600}
.comment-date{font-size:11px;color:var(--text3);margin-left:auto}
.comment-actions{display:flex;gap:6px;margin-top:10px}
.no-comments{text-align:center;padding:2rem;color:var(--text3);font-size:14px}

/* HISTORY */
.history-wrap{max-width:700px;margin:0 auto}
.history-row{display:flex;align-items:center;gap:1rem;padding:0.9rem 1.25rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:all .2s}
.history-row:hover{border-color:var(--border2)}
.history-emoji{font-size:28px;flex-shrink:0}
.history-info{flex:1;min-width:0}
.history-title{font-weight:500;font-size:14px}
.history-comment{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-date{font-size:11px;color:var(--text3);margin-top:2px}
.history-score{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--accent);flex-shrink:0}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--text3)}
.empty-state .big{font-size:48px;margin-bottom:1rem}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 18px;font-size:13px;font-weight:500;z-index:999;transform:translateY(100px);opacity:0;transition:all .3s;pointer-events:none;max-width:280px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:rgba(85,192,136,0.4);color:var(--green)}
.toast.error{border-color:rgba(224,85,85,0.4);color:var(--red)}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:2rem;flex-wrap:wrap}
.page-btn{padding:6px 14px;border-radius:6px;font-size:13px;background:var(--surface);border:1px solid var(--border);color:var(--text2);transition:all .2s}
.page-btn:hover,.page-btn.active{background:var(--accent);border-color:var(--accent);color:#000}
.page-info{font-size:13px;color:var(--text3)}
.flex-center{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo" onclick="goHome()">Orach</div>
  <div class="nav-links">
    <button class="nav-btn" onclick="showPage('marvel')">Marvel</button>
    <button class="nav-btn" onclick="showPage('dc')">DC</button>
    <button class="nav-btn" onclick="showPage('starwars')">Star Wars</button>
    <button class="nav-btn" onclick="showPage('rankings')">Rankings</button>
  </div>
  <div class="nav-user" id="navUser"></div>
</nav>

<div class="toast" id="toast"></div>

<!-- AUTH -->
<div class="page active" id="page-auth">
  <div class="auth-wrap">
    <div class="auth-box">
      <h1 class="auth-title">Orach</h1>
      <p class="auth-sub" id="authSub">Watch order for Marvel, DC, Star Wars and more.</p>
      <div id="authError" class="form-error" style="display:none"></div>
      <div id="authFormRegister" style="display:none">
        <label class="form-label">Username</label>
        <input class="form-input" id="regUsername" placeholder="e.g. parsa" />
        <label class="form-label">Password</label>
        <input class="form-input" id="regPassword" type="password" placeholder="Choose a password" />
        <button class="btn-primary" onclick="doRegister()">Create account</button>
        <div class="auth-toggle">Already have an account? <span onclick="toggleAuth('login')">Sign in</span></div>
      </div>
      <div id="authFormLogin">
        <label class="form-label">Username</label>
        <input class="form-input" id="loginUsername" placeholder="Your username" />
        <label class="form-label">Password</label>
        <input class="form-input" id="loginPassword" type="password" placeholder="Your password" />
        <button class="btn-primary" onclick="doLogin()">Sign in</button>
        <div class="auth-toggle">New here? <span onclick="toggleAuth('register')">Create account</span></div>
      </div>
    </div>
  </div>
</div>

<!-- RANKINGS -->
<div class="page" id="page-rankings">
  <div class="rankings-wrap">
    <div style="margin-bottom:1.5rem">
      <h2 style="font-size:40px;color:var(--accent)">RANKINGS</h2>
      <p style="color:var(--text2);font-size:14px">The best — ranked by your community</p>
    </div>
    <div class="rankings-tabs">
      <button class="tab-btn active" id="tab-site">Orach Top 50</button>
    </div>
    <div id="rankingsList"></div>
  </div>
</div>

<!-- MARVEL -->
<div class="page" id="page-marvel">
  <div class="rankings-wrap">
    <div style="margin-bottom:1.5rem">
      <h2 style="font-size:40px;color:var(--accent)">MARVEL</h2>
      <p style="color:var(--text2);font-size:14px">The full MCU, in the order you should watch it</p>
    </div>
    <div id="marvelList"></div>
  </div>
</div>

<!-- DC -->
<div class="page" id="page-dc">
  <div class="rankings-wrap">
    <div style="margin-bottom:1.5rem">
      <h2 style="font-size:40px;color:var(--accent)">DC</h2>
      <p style="color:var(--text2);font-size:14px">Watch order coming soon</p>
    </div>
    <div id="dcList"></div>
  </div>
</div>

<!-- STAR WARS -->
<div class="page" id="page-starwars">
  <div class="rankings-wrap">
    <div style="margin-bottom:1.5rem">
      <h2 style="font-size:40px;color:var(--accent)">STAR WARS</h2>
      <p style="color:var(--text2);font-size:14px">Watch order coming soon</p>
    </div>
    <div id="starwarsList"></div>
  </div>
</div>

<!-- DETAIL -->
<div class="page" id="page-detail">
  <div class="detail-wrap">
    <button class="detail-back" id="detailBackBtn">← Back</button>
    <div id="detailContent"></div>
  </div>
</div>

<script>
const MOVIES = [
  // ── MARVEL — PHASE 1 ──
  {id:1,title:"Iron Man",year:2008,genre:"Marvel",phase:"Phase 1",order:1,director:"Jon Favreau",desc:"Billionaire engineer Tony Stark builds a powered suit of armor after being held captive, becoming Iron Man.",emoji:"🤖",imdb:7.9},
  {id:2,title:"The Incredible Hulk",year:2008,genre:"Marvel",phase:"Phase 1",order:2,director:"Louis Leterrier",desc:"Bruce Banner hunts for a cure to the rage monster within him while evading the military.",emoji:"💚",imdb:6.6},

  {id:5,title:"Captain America: The First Avenger",year:2011,genre:"Marvel",phase:"Phase 1",order:5,director:"Joe Johnston",desc:"A frail young man is transformed into a super-soldier to fight in World War II.",emoji:"🛡️",imdb:6.9},
  {id:6,title:"The Avengers",year:2012,genre:"Marvel",phase:"Phase 1",order:6,director:"Joss Whedon",desc:"Earth's mightiest heroes team up for the first time to stop Loki and an alien invasion.",emoji:"🦸",imdb:8.0},
  // ── MARVEL — PHASE 2 ──
  {id:7,title:"Iron Man 3",year:2013,genre:"Marvel",phase:"Phase 2",order:7,director:"Shane Black",desc:"Tony Stark faces a mysterious terrorist known as the Mandarin while battling personal demons.",emoji:"🤖",imdb:7.1},
  {id:8,title:"Thor: The Dark World",year:2013,genre:"Marvel",phase:"Phase 2",order:8,director:"Alan Taylor",desc:"Thor must stop the Dark Elf Malekith from plunging the universe into darkness.",emoji:"⚡",imdb:6.8},
  {id:9,title:"Captain America: The Winter Soldier",year:2014,genre:"Marvel",phase:"Phase 2",order:9,director:"Anthony & Joe Russo",desc:"Cap uncovers a conspiracy within S.H.I.E.L.D. while facing a deadly assassin from his past.",emoji:"🛡️",imdb:7.8},
  {id:10,title:"Guardians of the Galaxy",year:2014,genre:"Marvel",phase:"Phase 2",order:10,director:"James Gunn",desc:"A band of misfit outlaws band together to protect the galaxy from a powerful threat.",emoji:"🚀",imdb:8.0},
  {id:11,title:"Avengers: Age of Ultron",year:2015,genre:"Marvel",phase:"Phase 2",order:11,director:"Joss Whedon",desc:"The Avengers face their greatest challenge yet — an artificial intelligence bent on extinction.",emoji:"🤖",imdb:7.3},
  {id:12,title:"Ant-Man",year:2015,genre:"Marvel",phase:"Phase 2",order:12,director:"Peyton Reed",desc:"A master thief uses a size-shifting suit to become a hero and pull off a heist that could save the world.",emoji:"🐜",imdb:7.1},
  // ── MARVEL — PHASE 3 ──
  {id:13,title:"Captain America: Civil War",year:2016,genre:"Marvel",phase:"Phase 3",order:13,director:"Anthony & Joe Russo",desc:"Political pressure divides the Avengers into two opposing factions led by Cap and Iron Man.",emoji:"🛡️",imdb:7.8},
  {id:14,title:"Doctor Strange",year:2016,genre:"Marvel",phase:"Phase 3",order:14,director:"Scott Derrickson",desc:"A brilliant but arrogant surgeon learns the mystic arts after a career-ending accident.",emoji:"🧙",imdb:7.5},
  {id:15,title:"Guardians of the Galaxy Vol. 2",year:2017,genre:"Marvel",phase:"Phase 3",order:15,director:"James Gunn",desc:"The Guardians uncover Star-Lord's true parentage and face new threats across the galaxy.",emoji:"🚀",imdb:7.6},
  {id:16,title:"Spider-Man: Homecoming",year:2017,genre:"Marvel",phase:"Phase 3",order:16,director:"Jon Watts",desc:"A young Peter Parker balances high school life with his new responsibilities as Spider-Man.",emoji:"🕷️",imdb:7.4},

let db;
let initializeApp, getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs;

async function initFirebase(){
  const appMod = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
  const dbMod  = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  initializeApp = appMod.initializeApp;
  getFirestore  = dbMod.getFirestore;
  doc           = dbMod.doc;
  getDoc        = dbMod.getDoc;
  setDoc        = dbMod.setDoc;
  deleteDoc     = dbMod.deleteDoc;
  collection    = dbMod.collection;
  getDocs       = dbMod.getDocs;
  const fbApp   = initializeApp(firebaseConfig);
  db            = getFirestore(fbApp);
}

// allRatings: { "username_seriesId": {username, seriesId, score, comment, date} }
let allRatingsCache = {}; // loaded once on login, refreshed on detail open
let ratingsLoaded = false;

async function loadAllRatings(){
  try{
    const snap = await getDocs(collection(db,'ratings'));
    allRatingsCache = {};
    snap.forEach(d=>{ allRatingsCache[d.id] = d.data(); });
    ratingsLoaded = true;
  }catch(e){ console.error('loadAllRatings',e); }
}

async function saveRatingToDb(username, seriesId, score, comment){
  const s=parseInt(score,10);
  if(!Number.isInteger(s)||s<1||s>10||String(score).includes('.')){
    throw new Error('Invalid score: must be a whole number between 1 and 10');
  }
  const key = `${username}_${seriesId}`;
  const data = {username, seriesId, score:s, comment, date: new Date().toISOString()};
  await setDoc(doc(db,'ratings',key), data);
  allRatingsCache[key] = data;
}

async function deleteRatingFromDb(username, seriesId){
  const key = `${username}_${seriesId}`;
  await deleteDoc(doc(db,'ratings',key));
  delete allRatingsCache[key];
}

async function saveUserToDb(username, password){
  await setDoc(doc(db,'users',username), {username, password});
}

async function getUserFromDb(username){
  const snap = await getDoc(doc(db,'users',username));
  return snap.exists() ? snap.data() : null;
}

  document.getElementById('authFormRegister').style.display=mode==='register'?'':'none';
  document.getElementById('authFormLogin').style.display=mode==='register'?'none':'';
  document.getElementById('authSub').textContent=mode==='register'?'Create your account to get started.':'Watch order for Marvel, DC, Star Wars and more.';
  hideAuthError();
}
function showAuthError(m){const e=document.getElementById('authError');e.textContent=m;e.style.display='';}
function hideAuthError(){document.getElementById('authError').style.display='none';}

async function doRegister(){
  const u=document.getElementById('regUsername').value.trim().toLowerCase();
  const p=document.getElementById('regPassword').value;
  if(!u||u.length<2){showAuthError('Username must be at least 2 characters.');return;}
  if(!p||p.length<4){showAuthError('Password must be at least 4 characters.');return;}
  showAuthError('⏳ Creating account...');
  try{
    const existing = await getUserFromDb(u);
    if(existing){showAuthError('That username is already taken.');return;}
    await saveUserToDb(u,p);
    state.currentUser=u;
    saveCurrentUser(u);
    await loadAllRatings();
    onLogin();
  }catch(e){showAuthError('Connection error. Please try again.');}
}

async function doLogin(){
  const u=document.getElementById('loginUsername').value.trim().toLowerCase();
  const p=document.getElementById('loginPassword').value;
  if(!u||!p){showAuthError('Please enter your username and password.');return;}
  showAuthError('⏳ Signing in...');
  try{
    const user = await getUserFromDb(u);
    if(!user||user.password!==p){showAuthError('Incorrect username or password.');return;}
    state.currentUser=u;
    saveCurrentUser(u);
    await loadAllRatings();
    onLogin();
  }catch(e){showAuthError('Connection error. Please try again.');}
}

function onLogin(){updateNav();showPage('marvel');showToast('Welcome, '+state.currentUser+'! 👋','success');}
function doLogout(){
  state.currentUser=null;
  saveCurrentUser('');
  allRatingsCache={};
  ratingsLoaded=false;
  updateNav();
  showPage('auth');
  toggleAuth('login');
  document.getElementById('loginUsername').value='';
  document.getElementById('loginPassword').value='';
}
function updateNav(){
  const u=state.currentUser;
  document.getElementById('navUser').innerHTML=u
    ?`<div class="avatar">${u.slice(0,2).toUpperCase()}</div><span class="nav-username">${u}</span><button class="nav-btn" onclick="doLogout()" style="font-size:12px;color:var(--text3)">Sign out</button>`
    :`<button class="nav-btn" onclick="showPage('auth')">Sign in</button>`;
}

// ── NAVIGATION ────────────────────────────────────────────────────────────
function showPage(name,push,restoreScroll){
  if(push===undefined)push=true;
  if(name==='auth'&&state.currentUser){showPage('marvel',push,restoreScroll);return;}
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  state.currentPage=name;
  if(name==='marvel'){renderFranchise('Marvel','marvel');}
  if(name==='dc'){renderFranchise('DC','dc');}
  if(name==='starwars'){renderFranchise('Star Wars','starwars');}
  if(name==='rankings'){renderRankings();}
  if(restoreScroll&&state.scrollPos[name]!==undefined){
    const y=state.scrollPos[name];
    requestAnimationFrame(()=>requestAnimationFrame(()=>window.scrollTo(0,y)));
  } else {
    window.scrollTo(0,0);
  }
  if(push)history.pushState({page:name},'','#'+name);
}
function goHome(){state.currentUser?showPage('marvel'):showPage('auth');}

window.addEventListener('popstate',(e)=>{
  const s=e.state;
  if(!s){goHome();return;}
  if(s.page==='detail'){openDetail(s.id,s.from,false);}
  else{showPage(s.page,false,true);}
});

// ── HELPERS ───────────────────────────────────────────────────────────────
function getAllRatings(sid){
  return Object.values(allRatingsCache)
    .filter(r=>r.seriesId===sid)
    .sort((a,b)=>new Date(b.date)-new Date(a.date));
}
function getSiteAvg(sid){
  const r=getAllRatings(sid);if(!r.length)return null;
  return Math.round(r.reduce((s,x)=>s+x.score,0)/r.length);
}
function getMyRating(sid){
  if(!state.currentUser)return null;
  return allRatingsCache[`${state.currentUser}_${sid}`]||null;
}
function formatDate(d){return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function showToast(msg,type){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'');
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
}
function posterBg(id){
  const c=['rgba(83,74,183,0.2)','rgba(15,110,86,0.2)','rgba(152,66,29,0.2)','rgba(153,53,86,0.2)','rgba(24,95,165,0.2)','rgba(132,80,11,0.2)'];
  return c[id%c.length];
}

// ── FRANCHISE TABS (Marvel / DC / Star Wars) ────────────────────────────────
function renderFranchise(franchise,pageName){
  const containerId=pageName+'List';
  const list=MOVIES.filter(m=>m.genre===franchise).sort((a,b)=>a.order-b.order);
  const el=document.getElementById(containerId);
  if(!list.length){
    el.innerHTML=`<div class="empty-state"><div class="big">🎬</div><p>Coming soon — the watch order will be added here.</p></div>`;
    return;
  }
  const renderRow=s=>{
    const num=list.indexOf(s)+1;
    if(s.comingSoon){
      return `<div class="rank-row" style="opacity:0.55;cursor:default">
        <span class="rank-num">${num}</span>
        ${rankPosterHtml(s)}
        <div class="rank-info"><div class="rank-title">${s.title}${s.type==='series'?'<span class="type-badge">SERIES</span>':''}</div><div class="rank-meta">Coming soon</div></div>
      </div>`;
    }
    const avg=getSiteAvg(s.id);
    return `<div class="rank-row" onclick="openDetail(${s.id},'${pageName}')">
      <span class="rank-num">${num}</span>
      ${rankPosterHtml(s)}
      <div class="rank-info"><div class="rank-title">${s.title}${s.type==='series'?'<span class="type-badge">SERIES</span>':''}</div><div class="rank-meta">${s.year}</div></div>
      ${avg!==null?`<span class="rank-score" style="color:var(--green)">👥 ${avg}</span>`:`<span class="rank-score" style="color:var(--text3)">—</span>`}
    </div>`;
  };
  const hasPhases=list.some(m=>m.phase);
  if(hasPhases){
    const phases=[...new Set(list.map(m=>m.phase))];
    el.innerHTML=phases.map(ph=>{
      const items=list.filter(m=>m.phase===ph);
      const rows=items.map(renderRow).join('');
      const meta=SECTION_META[ph];
      const metaHtml=meta?`<div style="margin:-0.5rem 0 1rem;font-size:13px;color:var(--text2);line-height:1.6">
          <p style="margin-bottom:4px">${meta.desc}</p>
          <p style="color:var(--accent);font-weight:500">⚠️ Required before watching: ${meta.required.join(' → ')}</p>
        </div>`:'';
      return `<div class="section-header" style="margin-top:1.5rem"><h2 class="section-title">${ph}</h2><span class="section-sub">${items.length} titles</span></div>${metaHtml}${rows}`;
    }).join('');
  } else {
    el.innerHTML=list.map(renderRow).join('');
  }
  preloadPosters(list);
}

// ── RANKINGS ──────────────────────────────────────────────────────────────
function rankPosterHtml(s){
  const cached=posterCache[s.id];
  const bg=posterBg(s.id);
  const img=cached&&cached!=='N/A'?`<img src="${cached}" alt="${s.title}" style="width:100%;height:100%;object-fit:cover;border-radius:10px;" onerror="this.remove()"/>`:'';
  return `<div class="rank-poster" data-poster="${s.id}" style="width:84px;height:124px;border-radius:10px;background:${bg};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:38px;overflow:hidden;position:relative;box-shadow:0 4px 14px rgba(0,0,0,0.35);">
    <span class="poster-emoji" style="${cached&&cached!=='N/A'?'display:none':''}">${s.emoji}</span>${img}
  </div>`;
}

function renderRankings(){
  const list=document.getElementById('rankingsList');
  const top=MOVIES.map(s=>({...s,avg:getSiteAvg(s.id)})).filter(s=>s.avg!==null).sort((a,b)=>b.avg-a.avg).slice(0,50);
  if(!top.length){list.innerHTML='<div class="empty-state"><div class="big">🎬</div><p>No ratings yet. Be the first to rate a movie!</p></div>';return;}
  list.innerHTML=top.map((s,i)=>{
    const n=i+1,cnt=getAllRatings(s.id).length;
    return `<div class="rank-row" onclick="openDetail(${s.id},'rankings')">
      <span class="rank-num${n<=3?' top3':''}">${n}</span>
      ${rankPosterHtml(s)}
      <div class="rank-info"><div class="rank-title">${s.title}</div><div class="rank-meta">${s.year} · ${cnt} rating${cnt!==1?'s':''}</div></div>
      <span class="rank-score" style="color:var(--green)">👥 ${s.avg}</span>
    </div>`;
  }).join('');
  preloadPosters(top);
}

// DETAIL
let selectedScore=0;
async function openDetail(id,from,push){
  if(push===undefined)push=true;
  const sel=window.getSelection();
  if(sel&&sel.toString().length>0)return; // don't navigate if user is selecting/copying text
  const originPage=from||state.currentPage||'marvel';
  if(push)state.scrollPos[originPage]=window.scrollY; // remember where we were so back can return here
  state.detailSeriesId=id;state.detailFrom=originPage;state.editingRating=false;selectedScore=0;
  document.getElementById('detailBackBtn').onclick=()=>history.back();
  showPage('detail',false);
  if(push)history.pushState({page:'detail',id,from:state.detailFrom},'','#detail-'+id);
  // Refresh all ratings from Firebase so we always see latest from all friends
  await loadAllRatings();
  renderDetail();
}
function renderDetail(){
  const s=MOVIES.find(x=>x.id===state.detailSeriesId);
  const avg=getSiteAvg(s.id);const allR=getAllRatings(s.id);const myR=getMyRating(s.id);const li=!!state.currentUser;
  let rateSection='';
  if(!li){
    rateSection=`<div class="rate-section" style="text-align:center"><p style="color:var(--text2);font-size:14px">Sign in to rate and comment.</p><button class="btn-submit" style="margin-top:1rem" onclick="showPage('auth')">Sign in</button></div>`;
  } else if(myR&&!state.editingRating){
    rateSection=`<div class="rate-section"><h3>Your Rating</h3>
      <div class="flex-center" style="margin-bottom:0.75rem">
        <span class="score-pill score-imdb" style="font-size:15px;padding:5px 14px">${myR.score}/10</span>
        <span style="font-size:12px;color:var(--text3)">Rated ${formatDate(myR.date)}</span>
      </div>
      ${myR.comment?`<p style="font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:1rem">"${myR.comment}"</p>`:''}
      <div class="flex-center"><button class="btn-edit" onclick="startEdit()">✏️ Edit</button><button class="btn-danger" onclick="deleteRating()">🗑 Delete</button></div>
    </div>`;
  } else {
    rateSection=`<div class="rate-section"><h3>${myR?'Edit Rating':'Rate This Movie'}</h3>
      <div class="score-input-row" style="display:flex;align-items:center;gap:10px;margin-bottom:1rem">
        <input type="number" inputmode="numeric" min="1" max="10" step="1" maxlength="2"
          class="score-input" id="scoreInput" placeholder="1–10"
          value="${selectedScore||''}"
          oninput="sanitizeScoreInput(this)"
          onkeydown="return blockInvalidScoreKeys(event)" />
        <span style="font-size:13px;color:var(--text3)">out of 10 — whole numbers only</span>
      </div>
      <textarea class="rate-textarea" id="commentInput" placeholder="Write a comment (optional)...">${myR&&myR.comment?myR.comment:''}</textarea>
      <div class="flex-center">
        <button class="btn-submit" onclick="submitRating()">${myR?'Update':'Submit'}</button>
        ${myR?`<button class="btn-edit" onclick="cancelEdit()">Cancel</button>`:''}
      </div>
    </div>`;
  }
  let commentsHtml=allR.length?allR.map(r=>{
    const isMe=state.currentUser&&r.username===state.currentUser;
    return `<div class="comment-card">
      <div class="comment-header">
        <div class="avatar" style="width:28px;height:28px;font-size:11px">${r.username.slice(0,2).toUpperCase()}</div>
        <span style="font-weight:500;font-size:13px">${r.username}</span>
        <span class="comment-score">${r.score}/10</span>
        <span class="comment-date">${formatDate(r.date)}</span>
      </div>
      ${r.comment?`<div class="comment-body">"${r.comment}"</div>`:'<div class="comment-body" style="color:var(--text3);font-style:italic">No comment left.</div>'}
      ${isMe?`<div class="comment-actions"><button class="btn-edit" onclick="startEdit()">✏️ Edit</button><button class="btn-danger" onclick="deleteRating()">🗑 Delete</button></div>`:''}
    </div>`;
  }).join(''):'<div class="no-comments">No ratings yet. Be the first!</div>';

  document.getElementById('detailContent').innerHTML=`
    <div class="detail-header">
      <div class="detail-poster" style="background:${posterBg(s.id)}" id="detailPoster">
        <span class="poster-emoji">${s.emoji}</span>
      </div>
      <div class="detail-info">
        <h1 class="detail-title">${s.title}</h1>
        <div class="detail-tagline">${s.year} · ${s.genre}</div>
        <p class="detail-desc">${s.desc}</p>
        <div class="detail-meta-row">
          <span class="detail-tag">🎬 ${s.director}</span>
          <span class="detail-tag">📅 ${s.year}</span>
          ${s.phase?`<span class="detail-tag">${s.phase} · #${MOVIES.filter(m=>m.genre===s.genre).sort((a,b)=>a.order-b.order).findIndex(m=>m.id===s.id)+1} in order</span>`:`<span class="detail-tag">#${MOVIES.filter(m=>m.genre===s.genre).sort((a,b)=>a.order-b.order).findIndex(m=>m.id===s.id)+1} in ${s.genre} watch order</span>`}
        </div>
      </div>
    </div>
    <div class="scores-row">
      <div class="score-card"><div class="score-label">IMDb Score</div><div class="score-val imdb">${s.imdb}</div><div class="score-count">Official rating</div></div>
      <div class="score-card"><div class="score-label">Friends' Avg</div>${avg!==null?`<div class="score-val friends">${avg}</div><div class="score-count">${allR.length} rating${allR.length!==1?'s':''}</div>`:`<div class="score-val none">—</div><div class="score-count">No ratings yet</div>`}</div>
      ${myR?`<div class="score-card"><div class="score-label">Your Score</div><div class="score-val" style="color:var(--blue)">${myR.score}</div><div class="score-count">Your rating</div></div>`:''}
    </div>
    ${rateSection}
    <div class="comments-section"><h3 style="font-size:22px;margin-bottom:1.25rem">Friends' Ratings & Comments</h3>${commentsHtml}</div>`;

  // Load poster for detail page
  fetchPoster(s).then(url=>{
    if(url&&url!=='N/A'){
      const el=document.getElementById('detailPoster');
      if(!el)return;
      const emoji=el.querySelector('.poster-emoji');
      injectPoster(el,url,emoji);
    }
  });
}
// Live-sanitize as the user types: strip anything that isn't a digit, clamp length to 2 chars.
function sanitizeScoreInput(el){
  let v=el.value.replace(/[^0-9]/g,'').slice(0,2);
  el.value=v;
  el.classList.remove('invalid');
}
// Block keystrokes that number inputs would otherwise allow through (e, +, -, ., comma, etc).
function blockInvalidScoreKeys(e){
  const blocked=['e','E','+','-','.',','];
  if(blocked.includes(e.key))return false;
  return true;
}
// Final authoritative check right before anything is saved — never trust the input alone.
function parseValidScore(raw){
  if(raw===null||raw===undefined)return null;
  const trimmed=String(raw).trim();
  if(!/^[0-9]{1,2}$/.test(trimmed))return null; // only whole digits, no letters/decimals/signs
  const n=parseInt(trimmed,10);
  if(!Number.isInteger(n)||n<1||n>10)return null;
  return n;
}

async function submitRating(){
  const el=document.getElementById('scoreInput');
  const score=parseValidScore(el.value);
  if(score===null){
    el.classList.add('invalid');
    showToast('Please enter a whole number between 1 and 10','error');
    return;
  }
  const comment=document.getElementById('commentInput').value.trim();
  try{
    await saveRatingToDb(state.currentUser, state.detailSeriesId, score, comment);
    state.editingRating=false;selectedScore=0;
    showToast('Rating saved! ✅','success');
    renderDetail();
  }catch(e){showToast('Error saving rating. Try again.','error');}
}

function startEdit(){state.editingRating=true;const r=getMyRating(state.detailSeriesId);if(r)selectedScore=r.score;renderDetail();}
function cancelEdit(){state.editingRating=false;selectedScore=0;renderDetail();}

async function deleteRating(){
  if(!confirm('Delete your rating for this movie?'))return;
  try{
    await deleteRatingFromDb(state.currentUser, state.detailSeriesId);
    state.editingRating=false;selectedScore=0;
    showToast('Rating deleted.','');
    renderDetail();
  }catch(e){showToast('Error deleting rating. Try again.','error');}
}

// POSTERS
const OMDB_KEY='8ab568f1';
const posterCache={};

function cleanTitle(title){
  return title
    .replace(/\s+S\d+$/i,'')
    .replace(/\s+S\d+\s*[-–:].*/i,'')
    .replace(/\s+Season\s*\d+.*/i,'')
    .replace(/\s+\(Complete\).*/i,'')
    .replace(/\s+\(US\).*/i,'')
    .trim();
}

async function fetchPoster(s){
  if(posterCache[s.id]!==undefined) return posterCache[s.id];
  const title=cleanTitle(s.posterTitle||s.title);
  const omdbType=s.type==='series'?'series':'movie';
  try{
    const url=`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&type=${omdbType}&apikey=${OMDB_KEY}`;
    const r=await fetch(url);
    const d=await r.json();
    if(d.Poster&&d.Poster!=='N/A'){
      posterCache[s.id]=d.Poster;
      return d.Poster;
    }
    posterCache[s.id]='N/A';
    return 'N/A';
  }catch(e){
    posterCache[s.id]='N/A';
    return 'N/A';
  }
}

function injectPoster(el,url,emoji){
  if(!el||!url||url==='N/A') return;
  if(el.querySelector('img')) return;
  const img=document.createElement('img');
  img.src=url;
  img.alt='poster';
  img.style='width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;';
  img.onload=function(){if(emoji)emoji.style.display='none';};
  img.onerror=function(){this.remove();};
  el.appendChild(img);
}

async function preloadPosters(seriesList){
  for(let i=0;i<seriesList.length;i+=4){
    const batch=seriesList.slice(i,i+4);
    const urls=await Promise.all(batch.map(s=>fetchPoster(s)));
    batch.forEach((s,idx)=>{
      const el=document.querySelector(`[data-poster="${s.id}"]`);
      if(!el) return;
      const emoji=el.querySelector('.poster-emoji');
      injectPoster(el,urls[idx],emoji);
    });
    // Small delay between batches to be kind to the API
    if(i+4<seriesList.length) await new Promise(r=>setTimeout(r,300));
  }
}

// INIT
async function init(){
  await initFirebase();
  const savedUser = loadCurrentUser();
  if(savedUser){
    state.currentUser = savedUser;
    updateNav();
    await loadAllRatings();
    showPage('marvel',false);
    history.replaceState({page:'marvel'},'','#marvel');
  } else {
    showPage('auth',false);
    history.replaceState({page:'auth'},'','#auth');
    toggleAuth('login');
  }
}
init();
</script>
